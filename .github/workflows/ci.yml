name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore services/user-service.Tests/user-service.Tests.csproj

      - name: Build
        run: dotnet build services/user-service.Tests/user-service.Tests.csproj --no-restore

      - name: Test
        run: dotnet test services/user-service.Tests/user-service.Tests.csproj --no-build --verbosity normal