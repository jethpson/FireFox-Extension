name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Log in to Azure Container Registry
        run: az acr login --name animetrackerregistry

      # User Service
      - name: Build and push user-service
        run: |
          docker build -t animetrackerregistry.azurecr.io/user-service:${{ github.sha }} ./services/user-service
          docker push animetrackerregistry.azurecr.io/user-service:${{ github.sha }}

      - name: Deploy user-service to staging
        run: |
          az containerapp update \
            --name user-service \
            --resource-group media_tracker-rg \
            --image animetrackerregistry.azurecr.io/user-service:${{ github.sha }} \
            --revision-suffix staging-${{ github.run_number }}

      - name: Swap user-service to production
        run: |
          az containerapp ingress traffic set \
            --name user-service \
            --resource-group media_tracker-rg \
            --revision-weight user-service--staging-${{ github.run_number }}=100

      # Schedule Sync Job
      - name: Build and push schedule-sync-job
        run: |
          docker build -t animetrackerregistry.azurecr.io/schedule-sync-function:${{ github.sha }} ./services/schedule-sync-function
          docker push animetrackerregistry.azurecr.io/schedule-sync-function:${{ github.sha }}

      - name: Update schedule-sync-job
        run: |
          az containerapp job update \
            --name schedule-sync-job \
            --resource-group media_tracker-rg \
            --image animetrackerregistry.azurecr.io/schedule-sync-function:${{ github.sha }}

      # Cleanup
      - name: Deactivate old revisions
        run: |
          az containerapp revision list \
            --name user-service \
            --resource-group media_tracker-rg \
            --query "[?properties.active==false].name" \
            --output tsv | xargs -I {} az containerapp revision deactivate \
            --name user-service \
            --resource-group media_tracker-rg \
            --revision {}