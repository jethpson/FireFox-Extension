<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Shows</title>
  <link rel="stylesheet" href="manage.css">
</head>
<body>
  <header>
    <h1>Manage shows</h1>
    <p class="subtitle">Browse and search available shows</p>
  </header>

  <main>
    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="Search shows..."
        autocomplete="off"
      />
    </div>

    <div id="results-container">
      <p class="status">Connect your API to load shows.</p>
    </div>
  </main>

  <script src="manage.js"></script>
</body>
</html>
